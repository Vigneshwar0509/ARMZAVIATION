version: '3.9'

services:
  mysql:
    image: mysql:8.1
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: armz
      MYSQL_USER: armz
      MYSQL_PASSWORD: armz
      MYSQL_ROOT_PASSWORD: replace_with_strong_root_password
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "900", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file:
      - ./backend/.env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings_prod
      DATABASE_URL: mysql://armz:armz@mysql:3306/armz
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: /bin/sh -c "python manage.py migrate && python manage.py collectstatic --noinput --clear && gunicorn config.wsgi:application --config gunicorn.conf.py.prod"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    expose:
      - 8000

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file:
      - ./backend/.env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings_prod
      DATABASE_URL: mysql://armz:armz@mysql:3306/armz
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: celery -A config.celery worker --loglevel=info
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    env_file:
      - ./frontend/.env.production
    environment:
      VITE_API_BASE_URL: https://yourdomain.com/api
    depends_on:
      - backend
    expose:
      - 5173

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    depends_on:
      - backend
      - frontend
    ports:
      - 80:80
      - 443:443
    volumes:
      - backend_static:/staticfiles:ro
      - backend_media:/media:ro
    networks:
      - appnet

volumes:
  mysql_data:
  backend_static:
  backend_media:

networks:
  appnet:
    driver: bridge
