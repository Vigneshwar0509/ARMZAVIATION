server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    root /srv/armz/frontend/dist;
    index index.html;

    # Serve frontend assets directly
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to Django/Gunicorn
    location /api/ {
        # When running under Docker Compose, use the backend service hostname
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header Connection "";
        proxy_redirect off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Proxy Django admin interface as well
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header Connection "";
        proxy_redirect off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Optional healthcheck path
    location /health {
        proxy_pass http://127.0.0.1:8000;
    }

    # Optional metrics path
    location /metrics {
        proxy_pass http://127.0.0.1:8000;
    }

    # Cache static build assets aggressively
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|svg|ico|webp|avif|ttf|woff|woff2|json)$ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Fallback for HTML routes
    location ~* \.(html)$ {
        try_files $uri =404;
    }

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy no-referrer-when-downgrade;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https: ws: wss:;";
}
